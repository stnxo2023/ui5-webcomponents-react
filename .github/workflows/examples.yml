name: Examples & Templates

on:
  push:
    branches:
      - 'main'
    paths:
      - 'examples/**/*'
      - 'templates/**/*'
      - 'patterns/navigation-layout/**/*'
  pull_request:
    paths:
      - 'examples/**/*'
      - 'templates/**/*'
      - 'patterns/navigation-layout/**/*'
permissions:
  contents: read

jobs:
  examples:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        path:
          - nextjs-app
          - nextjs-pages
          - react-router-ts
          - vite-ts
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'

      - name: Install
        run: npm ci
        working-directory: examples/${{ matrix.path }}

      - name: Build
        run: npm run build
        working-directory: examples/${{ matrix.path }}

      - name: Test
        run: npm run test --if-present
        working-directory: examples/${{ matrix.path }}

      - name: ESLint
        run: npm run lint --if-present
        working-directory: examples/${{ matrix.path }}

  templates:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        path:
          - nextjs-app
          - nextjs-pages
          - vite-ts
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'

      - name: Install
        run: npm ci
        working-directory: templates/${{ matrix.path }}

      - name: Build
        run: npm run build
        working-directory: templates/${{ matrix.path }}

      - name: Test
        run: npm run test --if-present
        working-directory: templates/${{ matrix.path }}

      - name: ESLint
        run: npm run lint --if-present
        working-directory: templates/${{ matrix.path }}

  patterns:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        path:
          - navigation-layout
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'

      - name: Install
        run: npm ci
        working-directory: patterns/${{ matrix.path }}

      - name: Build
        run: npm run build
        working-directory: patterns/${{ matrix.path }}

      - name: Test
        run: npm run test --if-present
        working-directory: patterns/${{ matrix.path }}

      - name: ESLint
        run: npm run lint --if-present
        working-directory: patterns/${{ matrix.path }}
